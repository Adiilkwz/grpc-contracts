name: Generate gRPC Code

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Protos Repo (Repo A)
      uses: actions/checkout@v3
      with:
        path: repo-a

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Install Protoc and Plugins
      run: |
        sudo apt-get install -y protobuf-compiler
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

    - name: Checkout Generated Repo (Repo B)
      uses: actions/checkout@v3
      with:
        repository: Adiilkwz/grpc-generated-go
        path: repo-b
        token: ${{ secrets.API_TOKEN_GITHUB }}

    - name: Generate Go Code
      run: |
        export PATH="$PATH:$(go env GOPATH)/bin"
        # Compile Payment Contract
        protoc -I=repo-a/proto --go_out=repo-b --go_opt=module=github.com/Adiilkwz/grpc-generated-go --go-grpc_out=repo-b --go-grpc_opt=module=github.com/Adiilkwz/grpc-generated-go repo-a/proto/payment/v1/payment.proto
        # Compile Order Stream Contract
        protoc -I=repo-a/proto --go_out=repo-b --go_opt=module=github.com/Adiilkwz/grpc-generated-go --go-grpc_out=repo-b --go-grpc_opt=module=github.com/Adiilkwz/grpc-generated-go repo-a/proto/order/v1/order_stream.proto

    - name: Push to Repo B
      run: |
        cd repo-b
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if git diff-index --quiet HEAD; then
          echo "No changes to commit"
        else
          git commit -m "Auto-generate gRPC code from protos"
          git push origin main
        fi