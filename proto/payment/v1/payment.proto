syntax = "proto3";

package payment.v1;

option go_package = "github.com/Adiilkwz/grpc-generated-go/payment/v1;paymentv1";

import "google/protobuf/timestamp.proto";

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
  rpc ListPayments(ListPaymentRequest) returns (ListPaymentResponse);
}

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2;
  string customer_email = 3;
}

message PaymentResponse {
  string transaction_id = 1;
  string status = 2; // e.g., "Authorized" or "Declined"
  google.protobuf.Timestamp processed_at = 3;
}

message ListPaymentRequest {
  string status = 1;
}

message ListPaymentResponse {
  repeated PaymentResponse payments = 1;
}